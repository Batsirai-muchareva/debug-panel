<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Debug — Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111d1d;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
}

  /* ── Modal ── */
  .modal {
    background: #0f1e1e;
    border: 1px solid #1e3535;
    border-radius: 16px;
    width: 420px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    position: relative;
}
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 18px;
    border-bottom: 1px solid #1e3535;
}
  .modal-title { font-size: 13px; font-weight: 600; color: #7ab8a8; letter-spacing: 0.04em; text-transform: uppercase; }
  .close-btn { background: none; border: none; color: #4a7a6a; cursor: pointer; font-size: 17px; padding: 2px 6px; border-radius: 6px; }

  /* ── Tabs ── */
  .tabs-primary { display: flex; align-items: stretch; border-bottom: 1px solid #1e3535; }
  .tabs-list { display: flex; flex: 1; }
  .tab-primary {
    padding: 10px 15px; font-size: 13px; font-weight: 500;
    color: #4a7a6a; cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s;
}
  .tab-primary.active { color: #eee; border-bottom-color: #7ab8a8; background: rgba(122,184,168,0.04); }

  .tabs-secondary { display: flex; border-bottom: 1px solid #1e3535; }
  .tab-secondary {
    flex: 1; text-align: center; padding: 10px;
    font-size: 13px; font-weight: 500; color: #4a7a6a;
    cursor: pointer; border: none; background: none;
    position: relative; transition: color 0.15s;
}
  .tab-secondary.active { color: #eee; }
  .tab-secondary.active::after {
    content: ''; position: absolute; bottom: -1px; left: 16px; right: 16px;
    height: 2px; background: #e5a820; border-radius: 2px 2px 0 0;
}

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center;
    padding: 5px 10px; background: #0d1a1a;
    border-bottom: 1px solid #1e3535; gap: 4px; min-height: 38px;
}
  .tool-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 9px; border-radius: 6px;
    font-size: 11.5px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; border: 1px solid transparent;
    background: transparent; color: #4a7a6a; transition: all 0.15s; white-space: nowrap;
}
  .tool-btn:hover { background: #1e3535; color: #ccc; border-color: #2a4545; }
  .tool-btn.active { background: #1e3535; color: #e5c47a; border-color: #3a5545; }
  .tool-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .toolbar-divider { width: 1px; height: 16px; background: #1e3535; margin: 0 2px; }

  /* ── Content ── */
  .content { padding: 16px; min-height: 280px; font-size: 13px; color: #4a7a6a; }

  /* ════════════════════════════════════════
     TOAST SYSTEM
  ════════════════════════════════════════ */
  .toast-container {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 6px;
    z-index: 100;
    pointer-events: none;
    width: calc(100% - 28px);
}

  .toast {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    pointer-events: all;
    white-space: nowrap;
    max-width: 100%;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);

    /* enter animation */
    animation: toastIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

  .toast.leaving {
    animation: toastOut 0.18s ease forwards;
}

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}
  @keyframes toastOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(4px) scale(0.96); }
}

  /* variants */
  .toast--success {
    background: #0d2a1e;
    border: 1px solid #1a4a2e;
    color: #5ecfa0;
}
  .toast--warning {
    background: #2a1e08;
    border: 1px solid #4a3510;
    color: #e5a820;
}
  .toast--error {
    background: #2a0e0e;
    border: 1px solid #4a1a1a;
    color: #e06c75;
}
  .toast--info {
    background: #0d1e2a;
    border: 1px solid #1a3545;
    color: #61afef;
}

  .toast-icon { width: 13px; height: 13px; flex-shrink: 0; }
  .toast-msg { flex: 1; }
  .toast-dismiss {
    background: none; border: none; cursor: pointer;
    color: inherit; opacity: 0.5; padding: 0 0 0 4px;
    font-size: 13px; line-height: 1; transition: opacity 0.12s;
    pointer-events: all;
}
  .toast-dismiss:hover { opacity: 1; }

  /* ── Demo buttons ── */
  .demo-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 16px; border-top: 1px solid #1e3535;
}
  .demo-btn {
    padding: 5px 12px; border-radius: 6px;
    font-size: 11.5px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; border: 1px solid #1e3535;
    background: #0d1a1a; color: #4a7a6a; transition: all 0.15s;
}
  .demo-btn:hover { background: #1e3535; color: #ccc; }
</style>
</head>
<body>

<div class="modal">
  <div class="modal-header">
    <span class="modal-title">Dev Debug</span>
    <button class="close-btn">✕</button>
  </div>

  <div class="tabs-primary">
    <div class="tabs-list">
      <button class="tab-primary active">Editor</button>
      <button class="tab-primary">Database</button>
      <button class="tab-primary">Schema</button>
    </div>
  </div>

  <div class="tabs-secondary">
    <button class="tab-secondary active">Local</button>
    <button class="tab-secondary">Classes</button>
  </div>

  <div class="toolbar">
    <button class="tool-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Highlight
    </button>
    <button class="tool-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg>
      Collapse
    </button>
    <div class="toolbar-divider"></div>
    <button class="tool-btn" onclick="showToast('Copied to clipboard', 'success', 'copy')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copy
    </button>
    <button class="tool-btn" onclick="showToast('Exported as debug-data.json', 'success', 'export')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
  </div>

  <div class="content">Hey There</div>

    <!-- Toast container lives inside the modal -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Demo trigger row -->
    <div class="demo-row">
    <button class="demo-btn" onclick="showToast('Copied to clipboard', 'success')">✓ Success</button>
    <button class="demo-btn" onclick="showToast('Exported as debug-data.json', 'info')">ℹ Info</button>
    <button class="demo-btn" onclick="showToast('No content to export', 'warning')">⚠ Warning</button>
    <button class="demo-btn" onclick="showToast('Failed to copy', 'error')">✕ Error</button>
  </div>
</div>

<script>
  const icons = {
    success: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
    warning: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    error:   `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
    info:    `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
};

  // Dedupe: track active toasts by key
  const activeToasts = {};

  function showToast( message, type = 'success', key = null ) {
    const container = document.getElementById('toastContainer');
    const dedupeKey = key || message;

    // If same toast is already showing, just reset its timer
    if ( activeToasts[ dedupeKey ] ) {
    clearTimeout( activeToasts[ dedupeKey ].timer );
    activeToasts[ dedupeKey ].timer = setTimeout(
    () => dismissToast( activeToasts[ dedupeKey ].el, dedupeKey ),
    2400
    );
    // pulse the existing toast
    activeToasts[ dedupeKey ].el.style.transform = 'scale(1.03)';
    setTimeout( () => { if (activeToasts[dedupeKey]) activeToasts[dedupeKey].el.style.transform = ''; }, 120 );
    return;
    }

    const toast = document.createElement('div');
    toast.className = `toast toast--${ type }`;
    toast.innerHTML = `
      ${ icons[ type ] }
      <span class="toast-msg">${ message }</span>
      <button class="toast-dismiss" onclick="dismissToast(this.parentElement, '${ dedupeKey }')">✕</button>
    `;

    container.appendChild( toast );

    const timer = setTimeout( () => dismissToast( toast, dedupeKey ), 2400 );
    activeToasts[ dedupeKey ] = { el: toast, timer };
}

  function dismissToast( el, key ) {
    if ( !el || !el.parentElement ) return;
    el.classList.add('leaving');
    el.addEventListener('animationend', () => {
    el.remove();
    delete activeToasts[ key ];
}, { once: true });
    if ( key && activeToasts[ key ] ) {
    clearTimeout( activeToasts[ key ].timer );
}
}
</script>
</body>
</html>
