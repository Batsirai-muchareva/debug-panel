<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Inspector – Path Overflow</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
      background: #0b1c1b;
      font-family: 'IBM Plex Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 40px 20px;
  }

  .label {
      font-size: 11px;
      color: #2e5e5c;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      align-self: flex-start;
      margin-left: calc(50% - 240px);
  }

  .panel {
      background: #0e2322;
      border: 1px solid #1e3d3b;
      border-radius: 14px;
      width: 480px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid #1e3d3b; }
  .tab {
      flex: 1; padding: 13px; text-align: center;
      font-size: 13px; font-weight: 500; color: #4a7a78;
      cursor: pointer; position: relative;
  }
  .tab.active { color: #e8c84a; }
  .tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: #e8c84a; border-radius: 2px 2px 0 0;
  }

  /* Toolbar */
  .toolbar {
      display: flex; align-items: center; gap: 4px;
      padding: 9px 12px; border-bottom: 1px solid #1a3230; flex-wrap: wrap;
  }
  .tool-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 9px; border-radius: 6px; font-size: 12px;
      color: #6ba8a5; background: transparent; border: none;
      cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
      transition: background 0.15s, color 0.15s;
  }
  .tool-btn:hover { background: #1a3d3b; color: #9dd4d1; }
  .tool-btn.active { background: #1f4a48; color: #e8c84a; }
  .tool-btn svg { width: 13px; height: 13px; }

  /* Search */
  .search-area {
      padding: 9px 12px; border-bottom: 1px solid #1a3230;
      display: flex; align-items: center; gap: 8px;
  }
  .search-box {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: #0a1a19; border: 1px solid #1e3d3b;
      border-radius: 8px; padding: 7px 12px;
  }
  .search-box input {
      background: transparent; border: none; outline: none;
      color: #c8e8e6; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; width: 100%;
  }

  /* ── PATH BAR ── */
  .path-bar {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #1a3230;
      min-height: 36px;
      position: relative;
      overflow: hidden; /* keeps the fade mask clipped */
  }

  .path-label {
      font-size: 10px; color: #3a6a68; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0 0 0 14px;
      flex-shrink: 0;
      z-index: 2;
  }

  /* scrollable crumb strip */
  .path-crumbs-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      min-width: 0;
  }

  /* fade-out on the right when overflowing */
  .path-crumbs-wrap::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 32px;
      background: linear-gradient(to right, transparent, #0e2322);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.2s;
  }
  .path-crumbs-wrap.overflowing::after { opacity: 1; }

  .path-crumbs {
      display: flex;
      align-items: center;
      padding: 8px 8px 8px 8px;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
  }
  .path-crumbs::-webkit-scrollbar { display: none; }

  .crumb {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: #5a9a97;
      cursor: pointer; border-radius: 4px;
      padding: 1px 4px;
      white-space: nowrap;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
  }
  .crumb:hover { color: #9dd4d1; background: #1a3230; }
  .crumb.last { color: #c8e8e6; font-weight: 600; }

  .crumb-sep {
      color: #2a5a58; font-size: 12px;
      margin: 0 1px; flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
  }

  /* collapsed ellipsis pill */
  .crumb-ellipsis {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #4a8a88;
      background: #122e2c; border: 1px solid #1e4a48;
      border-radius: 4px; padding: 1px 6px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
  }
  .crumb-ellipsis:hover { background: #1a3a38; color: #9dd4d1; }

  /* clear button */
  .clear-path-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 9px; margin-right: 10px;
      background: #122e2c; border: 1px solid #2a4a48;
      border-radius: 6px; color: #6ba8a5;
      font-size: 11px; font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer; flex-shrink: 0; z-index: 2;
      transition: all 0.15s;
  }
  .clear-path-btn:hover { background: #1f3a38; border-color: #3a6a68; color: #9dd4d1; }
  .clear-path-btn svg { width: 10px; height: 10px; }

  /* empty state */
  .path-empty-hint {
      font-size: 11px; color: #2a5a58;
      font-family: 'JetBrains Mono', monospace;
      font-style: italic; padding: 8px 8px;
      flex-shrink: 0;
  }

  /* Code */
  .code-area {
      padding: 18px 20px 22px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.75;
  }
  .t-bracket { color: #c8e8e6; }
  .t-key     { color: #6db5e8; }
  .t-str     { color: #e87070; }
  .t-val     { color: #c8a04a; }
  .t-arr     { color: #9dd4d1; }
  .indent    { padding-left: 18px; }

  /* Demo buttons */
  .demo-row {
      padding: 10px 12px; border-top: 1px solid #1a3230;
      display: flex; gap: 6px; flex-wrap: wrap;
  }
  .demo-btn {
      flex: 1; min-width: 90px;
      padding: 7px 6px; border-radius: 7px;
      font-size: 11px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 500;
      cursor: pointer; border: 1px solid #1e3d3b;
      background: #0a1a19; color: #4a7a78; transition: all 0.2s;
  }
  .demo-btn:hover { background: #152e2c; color: #7ac4c1; }
  .demo-btn.on { background: #1a3d3b; color: #9dd4d1; border-color: #2a6a68; }
</style>
</head>
<body>

<div class="panel" id="panel">

  <div class="tabs">
    <div class="tab active">Local</div>
    <div class="tab">Classes</div>
  </div>

  <div class="toolbar">
    <button class="tool-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>Highlight
    </button>
    <button class="tool-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-4 4 4M4 10l4 4 4-4"/></svg>Fold
    </button>
    <button class="tool-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>Expand
    </button>
    <button class="tool-btn active">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M11 11l3 3"/></svg>
    </button>
    <button class="tool-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M2 2h9v3"/></svg>Copy
    </button>
    <button class="tool-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v9M4 8l4 4 4-4M2 14h12"/></svg>Export
    </button>
  </div>

  <div class="search-area">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#4a7a78" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M11 11l3 3"/></svg>
      <input type="text" value="value" />
    </div>
  </div>

    <!-- PATH BAR -->
  <div class="path-bar" id="pathBar">
    <span class="path-label">PATH</span>
    <div class="path-crumbs-wrap" id="crumbsWrap">
      <div class="path-crumbs" id="pathCrumbs"></div>
    </div>
    <button class="clear-path-btn" id="clearBtn" onclick="clearPath()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      Clear
    </button>
  </div>

  <div class="code-area" id="codeArea"></div>

  <div class="demo-row">
    <button class="demo-btn on" onclick="setScenario('short')">Short path</button>
    <button class="demo-btn" onclick="setScenario('medium')">Medium path</button>
    <button class="demo-btn" onclick="setScenario('long')">Long path ↔</button>
    <button class="demo-btn" onclick="setScenario('cleared')">Cleared</button>
  </div>
</div>

<script>
  const SCENARIOS = {
      short: ['settings', 'title', 'value'],
      medium: ['config', 'layout', 'components', 'header', 'title', 'value'],
      long: ['root', 'application', 'config', 'layout', 'components', 'navigation', 'header', 'branding', 'logo', 'title', 'content', 'value'],
      cleared: []
  };

  const CODE = {
      short: `<div><span class="t-bracket">{</span></div>
<div class="indent"><span class="t-key">"content"</span><span class="t-bracket">: {</span></div>
<div class="indent indent"><span class="t-key">"$$type"</span>: <span class="t-str">"string"</span>,</div>
<div class="indent indent"><span class="t-key">"value"</span>: <span class="t-val">"CUSTOM"</span></div>
<div class="indent"><span class="t-bracket">},</span></div>
<div class="indent"><span class="t-key">"children"</span>: <span class="t-arr">[]</span></div>
<div><span class="t-bracket">}</span></div>`,

      medium: `<div><span class="t-bracket">{</span></div>
<div class="indent"><span class="t-key">"content"</span><span class="t-bracket">: {</span></div>
<div class="indent indent"><span class="t-key">"$$type"</span>: <span class="t-str">"string"</span>,</div>
<div class="indent indent"><span class="t-key">"value"</span>: <span class="t-val">"CUSTOM"</span></div>
<div class="indent"><span class="t-bracket">},</span></div>
<div class="indent"><span class="t-key">"children"</span>: <span class="t-arr">[]</span></div>
<div><span class="t-bracket">}</span></div>`,

      long: `<div><span class="t-bracket">{</span></div>
<div class="indent"><span class="t-key">"content"</span><span class="t-bracket">: {</span></div>
<div class="indent indent"><span class="t-key">"$$type"</span>: <span class="t-str">"string"</span>,</div>
<div class="indent indent"><span class="t-key">"value"</span>: <span class="t-val">"CUSTOM"</span></div>
<div class="indent"><span class="t-bracket">},</span></div>
<div class="indent"><span class="t-key">"children"</span>: <span class="t-arr">[]</span></div>
<div><span class="t-bracket">}</span></div>`,

      cleared: `<div><span class="t-bracket">{</span></div>
<div class="indent"><span class="t-key">"root"</span><span class="t-bracket">: {</span></div>
<div class="indent indent"><span class="t-key">"application"</span><span class="t-bracket">: {</span></div>
<div class="indent indent indent"><span class="t-key">"config"</span>: <span class="t-bracket">{ … }</span></div>
<div class="indent indent"><span class="t-bracket">}</span></div>
<div class="indent"><span class="t-bracket">}</span></div>
<div><span class="t-bracket">}</span></div>`
  };

  let currentScenario = 'short';
  let collapsed = false; // whether ellipsis is shown

  function buildCrumbs(path, useCollapse) {
      const crumbs = document.getElementById('pathCrumbs');
      crumbs.innerHTML = '';

      if (path.length === 0) {
          // empty state
          document.getElementById('clearBtn').style.display = 'none';
          const hint = document.createElement('span');
          hint.className = 'path-empty-hint';
          hint.textContent = '— no path selected —';
          crumbs.appendChild(hint);
          checkOverflow();
          return;
      }

      document.getElementById('clearBtn').style.display = 'flex';

      if (useCollapse && path.length > 4) {
          // show: first › … › last-2 › last-1 › last
          const addCrumb = (text, idx) => {
              const c = document.createElement('span');
              c.className = 'crumb' + (idx === path.length - 1 ? ' last' : '');
              c.textContent = text;
              c.onclick = () => navigateTo(idx);
              crumbs.appendChild(c);
          };
          const addSep = () => {
              const s = document.createElement('span');
              s.className = 'crumb-sep';
              s.textContent = '›';
              crumbs.appendChild(s);
          };

          addCrumb(path[0], 0);
          addSep();

          const pill = document.createElement('span');
          pill.className = 'crumb-ellipsis';
          pill.textContent = `+${path.length - 4} more`;
          pill.title = path.slice(1, path.length - 3).join(' › ');
          pill.onclick = () => { collapsed = false; buildCrumbs(path, false); };
          crumbs.appendChild(pill);
          addSep();

          for (let i = path.length - 3; i < path.length; i++) {
              addCrumb(path[i], i);
              if (i < path.length - 1) addSep();
          }
      } else {
          // full path
          path.forEach((seg, i) => {
              const c = document.createElement('span');
              c.className = 'crumb' + (i === path.length - 1 ? ' last' : '');
              c.textContent = seg;
              c.onclick = () => navigateTo(i);
              crumbs.appendChild(c);
              if (i < path.length - 1) {
                  const s = document.createElement('span');
                  s.className = 'crumb-sep';
                  s.textContent = '›';
                  crumbs.appendChild(s);
              }
          });
      }

      // always scroll to end to show active (last) crumb
      requestAnimationFrame(() => {
          const el = document.getElementById('pathCrumbs');
          el.scrollLeft = el.scrollWidth;
          checkOverflow();
      });
  }

  function checkOverflow() {
      const wrap = document.getElementById('crumbsWrap');
      const crumbs = document.getElementById('pathCrumbs');
      if (crumbs.scrollWidth > crumbs.clientWidth) {
          wrap.classList.add('overflowing');
      } else {
          wrap.classList.remove('overflowing');
      }
  }

  function setScenario(name) {
      currentScenario = name;
      collapsed = (name === 'long'); // auto-collapse for long

      document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('on'));
      event.target.classList.add('on');

      const path = SCENARIOS[name];
      buildCrumbs(path, collapsed);
      document.getElementById('codeArea').innerHTML = CODE[name] || CODE.short;
  }

  function navigateTo(idx) {
      const path = SCENARIOS[currentScenario].slice(0, idx + 1);
      buildCrumbs(path, false);
  }

  function clearPath() {
      buildCrumbs([], false);
      document.getElementById('codeArea').innerHTML = CODE.cleared;
      document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('on'));
  }

  // init
  buildCrumbs(SCENARIOS.short, false);
  document.getElementById('codeArea').innerHTML = CODE.short;

  window.addEventListener('resize', checkOverflow);
</script>
</body>
</html>
